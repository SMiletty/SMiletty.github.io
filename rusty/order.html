<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yummm Burgers App</title>

<style>
body { font-family: Arial; margin:0; background:#fafafa; }
nav { background:#c62828; color:white; padding:1rem; display:flex; justify-content:space-between; }
nav a { color:white; margin-left:15px; cursor:pointer; }
.page { display:none; padding:2rem; }
.active { display:block; }

.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
.card { background:white; padding:1rem; border-radius:10px; cursor:pointer; box-shadow:0 4px 10px rgba(0,0,0,0.1);} 
button { background:#c62828; color:white; border:none; padding:10px; margin-top:10px; cursor:pointer; }

.cart-item { display:flex; justify-content:space-between; margin:10px 0; }
</style>
</head>
<body>

<nav>
<h2>Yummm Burgers</h2>
<div>
<a onclick="navigate('menu')">Menu</a>
<a onclick="navigate('checkout')">Cart (<span id='cart-count'>0</span>)</a>
</div>
</nav>

<!-- MENU PAGE -->
<div id="menu" class="page active">
<h1>Menu</h1>
<div class="grid" id="menu-grid"></div>
</div>

<!-- ITEM PAGE -->
<div id="item" class="page">
<h1 id="item-name"></h1>
<p id="item-desc"></p>
<p id="item-price"></p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- CHECKOUT PAGE -->
<div id="checkout" class="page">
<h1>Checkout</h1>
<div id="cart-items"></div>
<h2 id="total"></h2>
<button onclick="checkout()">Place Order</button>
</div>

<script>
const menuData = [
{ id:1, name:"Classic Burger", desc:"Juicy beef burger", price:10.99 },
{ id:2, name:"Crispy Chicken", desc:"Fried chicken sandwich", price:9.99 },
{ id:3, name:"Fries", desc:"Crispy fries", price:4.99 }
];

let currentItem = null;
let cart = [];

function navigate(page){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(page).classList.add('active');
 if(page==='checkout') renderCart();
}

function renderMenu(){
 const grid = document.getElementById('menu-grid');
 grid.innerHTML='';
 menuData.forEach(item=>{
  const div=document.createElement('div');
  div.className='card';
  div.innerHTML=`<h3>${item.name}</h3><p>$${item.price}</p>`;
  div.onclick=()=>openItem(item);
  grid.appendChild(div);
 });
}

function openItem(item){
 currentItem=item;
 document.getElementById('item-name').innerText=item.name;
 document.getElementById('item-desc').innerText=item.desc;
 document.getElementById('item-price').innerText="$"+item.price;
 navigate('item');
}

function addToCart(){
 cart.push(currentItem);
 updateCartCount();
 alert('Added to cart');
}

function updateCartCount(){
 document.getElementById('cart-count').innerText=cart.length;
}

function renderCart(){
 const container=document.getElementById('cart-items');
 container.innerHTML='';
 let total=0;
 cart.forEach((item,i)=>{
  total+=item.price;
  const div=document.createElement('div');
  div.className='cart-item';
  div.innerHTML=`${item.name} - $${item.price} <button onclick="removeItem(${i})">X</button>`;
  container.appendChild(div);
 });
 document.getElementById('total').innerText="Total: $"+total.toFixed(2);
}

function removeItem(index){
 cart.splice(index,1);
 updateCartCount();
 renderCart();
}

function checkout(){
 alert('Order placed!');
 cart=[];
 updateCartCount();
 navigate('menu');
}

renderMenu();
</script>

</body>
</html>
